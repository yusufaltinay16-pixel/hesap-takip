<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Takip Pro (Bulut)</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBIFfk3-r8GE34GQ764qDEiDZ79org75XE",
  authDomain: "hesap-takip-2ec1e.firebaseapp.com",
  projectId: "hesap-takip-2ec1e",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addData = async function(type){
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  if(!amount) return alert("Tutar gir");

  await addDoc(collection(db, "transactions"), {
    type,
    amount: Number(amount),
    note,
    date: new Date()
  });

  alert("Kaydedildi");
  loadData();
}

window.loadData = async function(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "transactions"));

  querySnapshot.forEach((docSnap)=>{
    const d = docSnap.data();

    const div = document.createElement("div");
    div.innerHTML = `
      ${d.type} - ₺${d.amount} 
      <button onclick="sil('${docSnap.id}')">Sil</button>
    `;
    list.appendChild(div);
  });
}

window.sil = async function(id){
  await deleteDoc(doc(db, "transactions", id));
  loadData();
}

window.onload = loadData;
</script>

<style>
body{background:#111;color:white;font-family:Arial;padding:20px}
input{padding:10px;margin:5px}
button{padding:10px;margin:5px}
</style>

</head>
<body>

<h2>Hesap Takip (Bulutlu)</h2>

<input id="amount" placeholder="Tutar">
<input id="note" placeholder="Açıklama">

<br>

<button onclick="addData('Gelir')">Gelir Ekle</button>
<button onclick="addData('Gider')">Gider Ekle</button>

<h3>Kayıtlar</h3>
<div id="list"></div>

</body>
</html>
