<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Takip Pro</title>

<style>
body{background:#0b0b0f;color:white;font-family:sans-serif;margin:0;padding:20px}
button{padding:15px;margin:5px;width:100%;border:none;border-radius:10px;background:#1f2937;color:white;font-size:16px}
.card{background:#16181d;padding:15px;margin:10px 0;border-radius:15px}
.green{color:#19c37d}
.red{color:#ef4444}
</style>
</head>

<body>

<h1>Hesap Takip Pro</h1>

<div class="card">Genel Kasa: <span id="kasa">0</span> ₺</div>

<button onclick="gelir()">Gelir Ekle</button>
<button onclick="gider()">Gider Ekle</button>

<script>
let kasa=0;

function gelir(){
let t=prompt("Gelir gir");
if(!t)return;
kasa+=Number(t);
guncelle();
}

function gider(){
let t=prompt("Gider gir");
if(!t)return;
kasa-=Number(t);
guncelle();
}

function guncelle(){
document.getElementById("kasa").innerText=kasa;
}
</script>

</body>
</html>
